name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }}, CH ${{ matrix.clickhouse }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
        clickhouse: ["25.8", "26.4"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: tsc --noEmit

      - name: Build
        run: npm run build

      - name: ClickHouse image (cached)
        uses: ./.github/actions/clickhouse-image
        with:
          image: clickhouse/clickhouse-server:${{ matrix.clickhouse }}

      - name: Unit + Integration Tests
        run: npm test
        env:
          CH_VERSION: ${{ matrix.clickhouse }}

  dist:
    name: Dist Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build + Smoke Test
        run: npm run test:dist

  fuzz:
    name: Fuzz Tests (CH ${{ matrix.clickhouse }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        clickhouse: ["25.8", "26.4"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: ClickHouse image (cached)
        uses: ./.github/actions/clickhouse-image
        with:
          image: clickhouse/clickhouse-server:${{ matrix.clickhouse }}

      - name: Fuzz Tests (quick mode, 3K rows)
        run: FUZZ_ITERATIONS=3 FUZZ_ROWS=3000 npm run test:fuzz
        env:
          CH_VERSION: ${{ matrix.clickhouse }}
